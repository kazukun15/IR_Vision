
name: Android APK Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies (Java 11)
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-11-jdk build-essential libffi-dev libssl-dev zip unzip

    - name: Set JAVA_HOME
      run: echo "JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64" >> $GITHUB_ENV

    - name: Install Buildozer & Cython
      run: |
        pip install --upgrade pip setuptools wheel
        pip install buildozer==1.5.0 cython==0.29.36 virtualenv==20.25.1

    - name: Build APK with Buildozer
      run: |
        yes | buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: IR-Vision-App
        path: bin/*.apk
